#################################################
# Nginx vhost — learn.lifestreamdynamics.com
# Lifestream Learn landing page (static HTML)
#################################################
#
# Copy to: /etc/nginx/sites-available/learn.lifestreamdynamics.com
# Enable:  ln -s /etc/nginx/sites-available/learn.lifestreamdynamics.com \
#              /etc/nginx/sites-enabled/
# Test:    nginx -t
# Reload:  systemctl reload nginx
#
# Pure static: served from /var/www/learn-landing (rsynced by
# deploy/deploy-production.sh from infra/landing/). No upstream, no
# Node process. Directs visitors to the Play Store (once published)
# plus /terms and /privacy clean-URL pages.
#################################################

# ─── HTTP → HTTPS redirect + ACME challenge ──────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name learn.lifestreamdynamics.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ─── HTTPS vhost ─────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name learn.lifestreamdynamics.com;

    ssl_certificate     /etc/letsencrypt/live/learn.lifestreamdynamics.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/learn.lifestreamdynamics.com/privkey.pem;
    include /etc/nginx/conf.d/ssl.conf;

    # Security headers — same baseline as the API vhost, but CSP is
    # tightened to `'self'` since the landing page has no external
    # resources today (all CSS is inline, all images are local).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header X-XSS-Protection           "1; mode=block" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy    "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-ancestors 'none'; base-uri 'self';" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    access_log /var/log/nginx/learn-landing.access.log;
    error_log  /var/log/nginx/learn-landing.error.log;

    root  /var/www/learn-landing;
    index index.html;

    # Small static site — modest limits are fine.
    client_max_body_size 1M;

    # ─── Clean URLs for /terms and /privacy ─────────────────────────
    # infra/landing/ ships terms.html + privacy.html; map the clean URLs.
    location = /terms   { try_files /terms.html   =404; }
    location = /privacy { try_files /privacy.html =404; }

    # ─── Static assets ──────────────────────────────────────────────
    # Long-cache images + fonts; they're content-rev'd by name (logo-256.png,
    # logo-og.png, favicon.png — all rsynced from infra/landing/assets/).
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ─── Default: serve static HTML ─────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # ─── Deny dotfiles + attack patterns (same as API vhost) ────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~* (wp-admin|wp-login|xmlrpc\.php|\.env|\.git) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
