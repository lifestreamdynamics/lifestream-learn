#################################################
# Nginx vhost — learn-api.lifestreamdynamics.com
# Lifestream Learn (API + tusd uploads + HLS playback)
#################################################
#
# Copy to: /etc/nginx/sites-available/learn-api.lifestreamdynamics.com
# Enable:  ln -s /etc/nginx/sites-available/learn-api.lifestreamdynamics.com \
#              /etc/nginx/sites-enabled/
# Test:    nginx -t
# Reload:  systemctl reload nginx
#
# Modelled on accounting-api/deploy/nginx/api.lifestreamdynamics.com.conf
# (security headers, rate-limit zones, upstream + keepalive, /health
# no-log, ACME challenge location, dotfile + attack-pattern denies).
#
# Learn-specific routes borrowed from infra/nginx/local.conf:
#   /uploads/  → tusd (127.0.0.1:1080) with Tus-Resumable + Upload-* header
#               forwarding and proxy_request_buffering off
#   /hls/<sig>/<expires>/<videoId>/<path>
#              → secure_link HMAC validation →
#                SeaweedFS (127.0.0.1:8333/learn-vod/vod/<videoId>/<path>)
#   /api/*     → 127.0.0.1:3101 (learn-api Node process)
#
# HMAC secret: the caller sets $secure_link_secret from
# /etc/learn-api/hls-secret (a one-line file populated by the deploy
# script from HLS_SIGNING_SECRET in /etc/learn-api/.env). We keep the
# secret OUT of this config file so this file can live in the public
# monorepo.
#################################################

# ─── Rate-limit zones ───────────────────────────────────────────────
# `learn_` prefix (not just `api_`) so we can coexist with
# accounting-api's zones on the same nginx instance.
limit_req_zone $binary_remote_addr zone=learn_api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=learn_auth_limit:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=learn_conn_limit:10m;

# ─── Upstream ────────────────────────────────────────────────────────
upstream learn_api {
    server 127.0.0.1:3101;
    keepalive 64;
}

# ─── HTTP → HTTPS redirect + ACME challenge ──────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name learn-api.lifestreamdynamics.com;

    # Let's Encrypt webroot (matches deploy-production.sh certbot --webroot -w /var/www/certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ─── HTTPS vhost ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name learn-api.lifestreamdynamics.com;

    ssl_certificate     /etc/letsencrypt/live/learn-api.lifestreamdynamics.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/learn-api.lifestreamdynamics.com/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    limit_conn learn_conn_limit 50;

    # Security headers (matches accounting-api baseline)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header X-XSS-Protection           "1; mode=block" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none';" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    access_log /var/log/nginx/learn-api.access.log;
    error_log  /var/log/nginx/learn-api.error.log;

    # ─── Request size + timeouts ────────────────────────────────────
    # The tusd upload path needs its own (larger) client_max_body_size
    # set in its location block. Default is 10M for the API.
    client_max_body_size    10M;
    client_body_buffer_size 128k;
    proxy_connect_timeout   60s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;

    # ─── HLS secret injection ───────────────────────────────────────
    # The deploy script writes this value at /etc/learn-api/hls-secret
    # (one line, chmod 600, root-owned). We pull it into a var the
    # secure_link snippet can see via `set` (nginx `include` of a plain
    # text file via `ssl_certificate` style isn't applicable here; the
    # deploy script regenerates this vhost file with the `set` line
    # filled in, OR the operator edits it out-of-band). For the public
    # committed copy, the literal is a REPLACE_ME sentinel — nginx -t
    # will succeed; HMAC validation will fail 403 until the secret is
    # filled in.
    set $secure_link_secret "REPLACE_ME_WITH_HLS_SIGNING_SECRET";

    # ─── Health checks (no log, no rate limit) ──────────────────────
    location = /health {
        proxy_pass http://learn_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        access_log off;
    }

    location = /health/liveness {
        proxy_pass http://learn_api/health/liveness;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        access_log off;
    }

    # ─── Metrics (internal scrape only) ─────────────────────────────
    # Per threat-model.md TM-001: /metrics shares port 3011 in dev and
    # 3101 in prod, gated by METRICS_ENABLED. Allow loopback (Prometheus
    # on the same VPS) and the docker bridge (a future Prometheus
    # container on the shared network); deny everything else.
    # The default docker bridge uses 172.17.0.0/16, custom networks fall
    # under 172.18-31.0.0/16; 172.16.0.0/12 covers the whole RFC 1918
    # docker range without enumerating each network.
    location = /metrics {
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
    }

    # ─── Internal hooks (tusd-only, never public) ───────────────────
    # /internal/hooks/tusd is the pre-finish hook target. It's called
    # from tusd over the docker network (127.0.0.1:3101) and must never
    # be reachable from the internet. Allowlist matches /metrics: loopback
    # plus the RFC 1918 docker bridge range.
    location ^~ /internal/ {
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
    }

    # ─── Auth rate limiting (login / signup / refresh) ──────────────
    location ~ ^/api/v1/auth/(login|register|reset-password|refresh) {
        limit_req        zone=learn_auth_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://learn_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── API proxy (the default) ────────────────────────────────────
    location /api/ {
        limit_req        zone=learn_api_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://learn_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── tusd resumable uploads ─────────────────────────────────────
    # Borrowed verbatim from infra/nginx/local.conf (the section that
    # forwards Tus-* headers + disables request buffering).
    # Difference from dev: upstream is the VPS-local tusd on 127.0.0.1
    # instead of the docker compose `tusd` hostname, and we don't need
    # a docker DNS resolver for a literal IP.
    location /uploads/ {
        # Strip /uploads/ prefix so tusd sees /files/...
        rewrite ^/uploads/(.*)$ /$1 break;

        proxy_pass             http://127.0.0.1:1080;
        proxy_http_version     1.1;
        proxy_request_buffering off;
        proxy_buffering         off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Tus-Resumable       $http_tus_resumable;
        proxy_set_header Upload-Length       $http_upload_length;
        proxy_set_header Upload-Metadata     $http_upload_metadata;
        proxy_set_header Upload-Offset       $http_upload_offset;
        proxy_set_header Upload-Defer-Length $http_upload_defer_length;
        proxy_set_header Upload-Concat       $http_upload_concat;

        client_max_body_size 5G;     # matches compose override; VPS has 38 GB free
        proxy_read_timeout   3600s;
        proxy_send_timeout   3600s;
    }

    # ─── HLS playback ───────────────────────────────────────────────
    # Same regex + variable shape as infra/nginx/local.conf; the only
    # changes are (a) upstream is 127.0.0.1:8333 literal and (b) the
    # secret is sourced via the outer `set $secure_link_secret` above
    # instead of a hardcoded dev value.
    location ~ ^/hls/(?<sig>[A-Za-z0-9_-]+)/(?<path_expires>[0-9]+)/(?<video_id>[A-Za-z0-9-]+)/(?<vod_path>.*)$ {
        set $secure_link_expires_override $path_expires;
        set $signed_prefix "/hls/$video_id/";
        include /etc/nginx/snippets/learn-secure_link.conf.inc;

        gzip off;

        # Rewrite to the SeaweedFS bucket layout.
        rewrite ^.*$ /learn-vod/vod/$video_id/$vod_path break;
        proxy_pass http://127.0.0.1:8333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Cache segments aggressively at the nginx layer (they're
        # immutable, content-hashed URLs). Safe because expiry is
        # enforced by secure_link above before we ever reach here.
        proxy_read_timeout 60s;
    }

    # ─── Deny dotfiles + common attack patterns ─────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~* (wp-admin|wp-login|xmlrpc\.php|\.env|\.git) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
