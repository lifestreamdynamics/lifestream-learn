# lifestream_learn_app
# Flutter Android app for Lifestream Learn.
# License: AGPL-3.0-or-later (see ../LICENSE).
name: lifestream_learn_app
description: "Lifestream Learn — Flutter Android app (learner feed + designer authoring)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  dio: ^5.7.0
  go_router: ^14.2.0
  flutter_secure_storage: ^9.2.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  # Slice D: TikTok-style vertical feed + player.
  video_player: ^2.9.2
  fvp: ^0.25.0
  visibility_detector: ^0.4.0+2
  # Slice E: designer authoring.
  # NOTE: roadmap asked for ^5.0.0; latest pub.dev stable is 2.5.0
  # (the package jumped majors internally on a fork that never hit pub).
  tus_client_dart: ^2.5.0
  file_picker: ^8.0.0
  # Transitive of tus_client_dart / file_picker; declare directly so our
  # use of `XFile` in the designer flow passes lint.
  cross_file: ^0.3.4+1
  # Slice F: offline-survivable analytics buffer persists to a JSON file
  # under the app's private documents directory.
  path_provider: ^2.1.4
  # Slice F: Skeletonizer-style loading placeholders on list screens.
  # 2.x is required because Flutter 3.41's ui.Canvas adds
  # `drawRSuperellipse` which skeletonizer 1.x doesn't implement in its
  # painting-context shim (compile-time abstract-member error).
  skeletonizer: ^2.1.3
  # Post-Slice-F: crash reporting to Lifestream Vault. Pure Dart SDK
  # (no Flutter deps of its own) — we wire it into `lib/core/crash/`
  # with a SecureStorageBackend adapter so offline-queued reports use
  # the same encrypted storage as the auth tokens. `hasCrashReportingConfig`
  # gates uploads: when LEARN_CRASH_API_KEY is absent the SDK is in
  # `enabled: false` mode and all capture calls are no-ops. See
  # `lib/config/crash_reporting_config.dart` for the key-rotation flow.
  lifestream_doctor: ^1.0.2
  # Slice P7a — biometric unlock toggle in settings. The plugin exposes
  # `canCheckBiometrics` / `getAvailableBiometrics` / `authenticate`;
  # we persist the preference in `SettingsStore` and consult the plugin
  # on app bootstrap via `core/auth/biometric_gate.dart`. Android-only
  # wiring is all we need for the Lifestream Learn app target.
  local_auth: ^2.1.6
  credential_manager: ^2.0.8
  # Slice P8 — personal data export. The export screen writes a JSON
  # file to the app's documents directory and triggers the OS share
  # sheet (Gmail, Drive, Files, etc.) so the user can hand the file
  # off wherever they want it. `share_plus` is the platform-bridged
  # invoker; `XFile` comes from `cross_file` (already a direct dep).
  share_plus: ^10.0.0
  # Validation-follow-up: Gravatar fallback in the profile header hashes
  # the user's email with SHA-256. `crypto` is already a transitive dep
  # of several packages above; pinning it directly lets `ProfileHeader`
  # import `package:crypto/crypto.dart` without triggering
  # `depend_on_referenced_packages` lint.
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  # Explicitly depended on so tests can substitute an in-memory platform
  # implementation in place of the real Android Method Channel.
  flutter_secure_storage_platform_interface: ^1.0.2
  # Slice E: deterministic virtual clock for cue scheduler timing tests.
  fake_async: ^1.3.1
  # Slice F: launcher icon + splash generation. Tools only — never imported
  # in library code.
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1
  # Post-Slice-F: crash reporter tests mock `http.Client` to exercise
  # the enabled-mode capture path without touching the network.
  # `http` is a transitive dep of `lifestream_doctor`, declared here
  # directly so the test imports pass lint.
  http: ^1.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
