# Launcher icon generation config. Run:
#   dart run flutter_launcher_icons
# to regenerate the mipmap PNGs under android/app/src/main/res/.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#050A14"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21
