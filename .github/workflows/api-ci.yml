name: api-ci

on:
  pull_request:
    paths:
      - 'api/**'
      - '.github/workflows/api-ci.yml'
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/api-ci.yml'

concurrency:
  group: api-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: api

jobs:
  lint-type-unit:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: api/.nvmrc
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage
          path: api/coverage
          if-no-files-found: ignore
          retention-days: 7

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    # Integration tests need Postgres + Redis. SeaweedFS + tusd + nginx
    # aren't provisioned here, so the three compose-dependent suites
    # (transcode-e2e, transcode-resilience, secure-link, health) are
    # skipped via --testPathIgnorePatterns. Those run in a nightly job
    # once the compose stack is hosted somewhere reachable from CI.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: learn_api_user
          POSTGRES_PASSWORD: learn_dev
          POSTGRES_DB: learn_api_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U learn_api_user -d learn_api_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://learn_api_user:learn_dev@localhost:5432/learn_api_test
      REDIS_URL: redis://localhost:6379
      REDIS_KEY_PREFIX: 'learn_test:'
      JWT_ACCESS_SECRET: ci_access_secret_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      JWT_REFRESH_SECRET: ci_refresh_secret_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      S3_ENDPOINT: http://localhost:8334
      S3_ACCESS_KEY: ci_access_key
      S3_SECRET_KEY: ci_secret_key
      TUSD_PUBLIC_URL: http://localhost:1081/files
      HLS_BASE_URL: http://localhost:8090/hls
      HLS_SIGNING_SECRET: ci_hls_signing_secret_xxxxxxxxxxxxxxxxxxxxxxxxxx
      TUSD_HOOK_SECRET: ci_tusd_hook_secret_xxxxxxxxxx
      SEED_ADMIN_PASSWORD: ci_admin_password_xxxx
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: api/.nvmrc
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - name: Run integration tests (compose-independent only)
        run: |
          npx jest --config jest.integration.config.js \
            --testPathIgnorePatterns="transcode|secure-link|health.test"
