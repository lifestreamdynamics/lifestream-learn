name: app-ci

on:
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/app-ci.yml'
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/app-ci.yml'

concurrency:
  group: app-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: app

jobs:
  analyze-test:
    name: Flutter analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          # Match the Dart SDK constraint in app/pubspec.yaml. Update both
          # together when bumping Dart/Flutter.
          flutter-version: '3.35.x'
          channel: stable
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - name: Verify generated files are up to date
        # .g.dart / .freezed.dart are checked in; fail CI if the
        # generator would produce different output than what's
        # committed. Catches "forgot to run build_runner" PRs.
        run: |
          flutter pub run build_runner build --delete-conflicting-outputs
          if ! git diff --quiet; then
            echo "::error::Generated files are out of date. Run \`flutter pub run build_runner build\` locally and commit the changes."
            git diff --stat
            exit 1
          fi
      - run: flutter analyze
      - run: flutter test --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-coverage
          path: app/coverage
          if-no-files-found: ignore
          retention-days: 7

  debug-apk:
    name: Debug APK build (smoke)
    runs-on: ubuntu-latest
    needs: analyze-test
    # Only on main pushes to avoid slowing PR cycles — the compile
    # check in the app dir already runs as part of flutter test.
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.x'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug
