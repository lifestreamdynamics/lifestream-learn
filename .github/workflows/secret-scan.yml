name: secret-scan

on:
  pull_request:
  push:
    branches: [main]

# Belt-and-braces: the local .githooks/pre-push already runs gitleaks
# before every push, but `core.hooksPath` isn't guaranteed to be set on
# every contributor's clone. This server-side check catches anything
# that slipped past.
#
# Project-specific rules live in .gitleaks.toml at the repo root —
# operator-private hostnames (REDACTED-VPS-HOST, REDACTED-BRAND-DOMAIN,
# REDACTED-DOMAIN) are blocked there with a single allowlisted
# exception for the public learn@lifestreamdynamics.com forwarder.

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          # No license key needed for public repos. If/when this repo
          # becomes private, add GITLEAKS_LICENSE to org secrets.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
