schema_version: 1
name: learn-landing
plugin: vite-spa
version_scheme: semver
target: vps

remote:
  host: mittonvillage.com
  # `learn-landing` doesn't need its own system user — it's pure static
  # HTML served by nginx (running as www-data). We use `www-data` as the
  # owner so nginx can read the files directly. lsd's Phase 5 cutover
  # only needs ssh_user (root) write access to flip the symlink.
  user: www-data
  ssh_user: root
  app_dir: /var/www/learn-landing
  releases_kept: 5

build:
  # Pre-built static HTML — no build step. The vite-spa plugin requires
  # at least one build.commands entry, so this is a no-op that forces a
  # quick sanity check (index.html must exist in artifact_dir below; if
  # it's missing the test exits 1 and the deploy aborts before staging).
  commands:
    - test -s index.html
  artifact_dir: .
  # `dependency_checks: []` — no upstream API to probe for landing.
  dependency_checks: []

services:
  - kind: none

health:
  url: https://learn.lifestreamdynamics.com/
  expect_status: 200
  timeout_s: 15
  retries: 5
  retry_delay_s: 3

nginx:
  template: static.conf.tpl
  server_name: learn.lifestreamdynamics.com
