# Local development stack for Lifestream Learn.
# Production deployments use the Ansible playbooks in ./ansible/, not this file.

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: learn_api_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learn_dev}
      POSTGRES_DB: learn_api_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "learn_api_user"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: >
      server -dir=/data
      -s3
      -s3.config=/config/s3.json
      -filer
      -master.volumeSizeLimitMB=1024
    ports:
      - "8333:8333"   # S3 API
      - "9333:9333"   # master
      - "8888:8888"   # filer
    volumes:
      - seaweedfs_data:/data
      - ./seaweedfs/s3.json:/config/s3.json:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9333/cluster/status"]
      interval: 10s
      retries: 10

  tusd:
    image: tusproject/tusd:latest
    command:
      - "-s3-bucket=learn-uploads"
      - "-s3-endpoint=http://seaweedfs:8333"
      - "-hooks-http=http://api:3011/internal/hooks/tusd"
      - "-port=1080"
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-learn_access_key}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-learn_secret_key}
      AWS_REGION: us-east-1
    ports:
      - "1080:1080"
    depends_on:
      seaweedfs:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  seaweedfs_data:
