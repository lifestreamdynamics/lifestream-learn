# =============================================================================
# local.conf — docker compose variant of the learn.REDACTED-BRAND-DOMAIN site
# =============================================================================
# HTTP-only (no TLS — too much cert friction for local dev). Mounts into
# /etc/nginx/conf.d/default.conf inside the `nginx` compose service.
#
# Upstreams use compose service DNS names:
#   - seaweedfs:8333  (S3 gateway)
#   - tusd:1080       (resumable uploads)
#   - api:3011        (Phase 2; 502 until then — API service is not in compose
#                     yet, so this proxy_pass resolves to no host and nginx
#                     logs will show "could not resolve". That's expected.)
#
# The /hls/ location uses the same secure_link.conf.inc we'll reuse at
# deploy time, with a fixed dev-only secret baked in via `set`.
# =============================================================================

# Resolve compose service names at runtime (Docker embedded DNS).
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80 default_server;
    server_name _;

    server_tokens off;
    client_max_body_size 5G;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Landing page — mounted from ../infra/landing/ (Subagent C's deliverable).
    location / {
        root /var/www/learn-landing;
        try_files $uri $uri/ /index.html =404;
    }

    # Phase 2 upstream; 502 expected locally until the API service joins compose.
    location /api/ {
        set $api_upstream "api:3011";
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        set $tusd_upstream "tusd:1080";
        # With a variable-based upstream, nginx does NOT apply the implicit
        # trailing-slash URI rewrite — we must strip the /uploads/ prefix
        # ourselves so tusd sees /files/... (its actual endpoint).
        rewrite ^/uploads/(.*)$ /$1 break;
        proxy_pass http://$tusd_upstream;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering         off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Tus-Resumable       $http_tus_resumable;
        proxy_set_header Upload-Length       $http_upload_length;
        proxy_set_header Upload-Metadata     $http_upload_metadata;
        proxy_set_header Upload-Offset       $http_upload_offset;
        proxy_set_header Upload-Defer-Length $http_upload_defer_length;
        proxy_set_header Upload-Concat       $http_upload_concat;

        client_max_body_size 5G;
        proxy_read_timeout   3600s;
        proxy_send_timeout   3600s;
    }

    location /hls/ {
        # Local dev secret only — overridden by SECURE_LINK_SECRET env via
        # `envsubst` preprocessing would be nicer, but keep it simple: docker
        # env passes the secret as a default_type on the compose side and the
        # sign-hls-url.sh helper reads the same value.
        set $secure_link_secret "local_dev_secret_do_not_use_in_prod";
        include /etc/nginx/snippets/secure_link.conf.inc;

        gzip off;

        set $seaweedfs_s3_upstream "seaweedfs:8333";
        proxy_pass http://$seaweedfs_s3_upstream/learn-vod$uri?;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
