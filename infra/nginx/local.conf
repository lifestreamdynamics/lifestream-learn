# =============================================================================
# local.conf — docker compose variant of the learn.REDACTED-BRAND-DOMAIN site
# =============================================================================
# HTTP-only (no TLS — too much cert friction for local dev). Mounts into
# /etc/nginx/conf.d/default.conf inside the `nginx` compose service.
#
# Upstreams use compose service DNS names where the upstream is in compose
# (seaweedfs, tusd) and host.docker.internal where it isn't (the API runs on
# the host during dev — see compose's `extra_hosts: host-gateway` mapping).
#   - seaweedfs:8333               (S3 gateway, in compose)
#   - tusd:1080                    (resumable uploads, in compose)
#   - host.docker.internal:3011    (learn-api on the host)
#
# The /hls/ location uses the same secure_link.conf.inc we'll reuse at
# deploy time, with a fixed dev-only secret baked in via `set`.
# =============================================================================

# Resolve compose service names AND host.docker.internal at runtime. Docker's
# embedded DNS at 127.0.0.11 handles both — the latter via the host-gateway
# extra_host mapping declared on the nginx service in docker-compose.yml.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80 default_server;
    server_name _;

    server_tokens off;
    client_max_body_size 5G;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Landing page — mounted from ../infra/landing/ (Subagent C's deliverable).
    location / {
        root /var/www/learn-landing;
        try_files $uri $uri/ /index.html =404;
    }

    # learn-api runs on the host during dev (not in compose). The
    # host.docker.internal alias resolves to the host gateway via the
    # `extra_hosts` entry on the nginx service in docker-compose.yml —
    # that writes /etc/hosts, which nginx only reads when the upstream
    # is a LITERAL hostname (not a `set $var`). So unlike the compose-
    # service upstreams below, we inline the hostname here and let
    # nginx resolve it once at config-load via /etc/hosts.
    location /api/ {
        proxy_pass http://host.docker.internal:3011;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        set $tusd_upstream "tusd:1080";
        # Previously this block rewrote /uploads/(.*)$ → /$1 so tusd's
        # /files/... endpoint was reachable. With tusd started under
        # -base-path=/uploads/files/ the router expects the full
        # /uploads/files/<id> path — so we pass the URI straight through
        # and drop the rewrite entirely.
        # Resolved 2026-04-26 (tusd Location header -base-path fix).
        proxy_pass http://$tusd_upstream;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering         off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Required by tusd -behind-proxy so it can reconstruct correct
        # absolute Location URLs (http://<host>:<port>/uploads/files/<id>)
        # rather than echoing back its internal tusd:1080 address.
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_set_header Tus-Resumable       $http_tus_resumable;
        proxy_set_header Upload-Length       $http_upload_length;
        proxy_set_header Upload-Metadata     $http_upload_metadata;
        proxy_set_header Upload-Offset       $http_upload_offset;
        proxy_set_header Upload-Defer-Length $http_upload_defer_length;
        proxy_set_header Upload-Concat       $http_upload_concat;

        client_max_body_size 5G;
        proxy_read_timeout   3600s;
        proxy_send_timeout   3600s;
    }

    # Public URL space is path-embedded-token HLS:
    #   /hls/<sig>/<expires>/<videoId>/...
    # We capture the three components, run secure_link validation, and on
    # pass proxy to SeaweedFS at `learn-vod/vod/<videoId>/...`. The sig
    # authorizes the full prefix `/hls/<videoId>/` so master, variant
    # playlists, init segments, and media segments all validate under
    # the same token — no player-side query propagation needed.
    location ~ ^/hls/(?<sig>[A-Za-z0-9_-]+)/(?<path_expires>[0-9]+)/(?<video_id>[A-Za-z0-9-]+)/(?<vod_path>.*)$ {
        # Local dev secret only — production uses SECURE_LINK_SECRET.
        set $secure_link_secret "local_dev_secret_do_not_use_in_prod";
        set $secure_link_expires_override $path_expires;
        set $signed_prefix "/hls/$video_id/";
        include /etc/nginx/snippets/secure_link.conf.inc;

        gzip off;

        set $seaweedfs_s3_upstream "seaweedfs:8333";
        # Rewrite to the SeaweedFS bucket layout. `$vod_path` is the
        # portion after `/hls/<sig>/<expires>/<videoId>/`, e.g. `master.m3u8`
        # or `v_0/seg_001.m4s`.
        rewrite ^.*$ /learn-vod/vod/$video_id/$vod_path break;
        proxy_pass http://$seaweedfs_s3_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
